apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: chatbot-network-policy
  namespace: chatbot
  labels:
    app: chatbot
spec:
  podSelector:
    matchLabels:
      app: chatbot
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from Ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000
    
    # Allow traffic from monitoring namespace (Prometheus)
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - protocol: TCP
          port: 8000
  
  egress:
    # Allow DNS resolution
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    
    # Allow LDAP/AD communication
    - to: []
      ports:
        - protocol: TCP
          port: 636  # LDAPS
        - protocol: TCP
          port: 389  # LDAP
    
    # Allow LLM API calls
    - to: []
      ports:
        - protocol: TCP
          port: 443  # HTTPS
    
    # Allow Redis (if using)
    # - to:
    #     - podSelector:
    #         matchLabels:
    #           app: redis
    #   ports:
    #     - protocol: TCP
    #       port: 6379
    
    # Allow PostgreSQL (if using)
    # - to:
    #     - podSelector:
    #         matchLabels:
    #           app: postgres
    #   ports:
    #     - protocol: TCP
    #       port: 5432
