apiVersion: v1
kind: Service
metadata:
  name: chatbot-service
  namespace: chatbot
  labels:
    app: chatbot
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
spec:
  type: ClusterIP
  selector:
    app: chatbot
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
  sessionAffinity: None
